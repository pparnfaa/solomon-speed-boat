services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5100:5100"
    environment:
      PORT: "5100"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: speedboat
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
